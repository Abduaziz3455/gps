server {
    listen 80;
    server_name tbbdispatcher.uz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name tbbdispatcher.uz;

    ssl_certificate     /etc/letsencrypt/live/tbbdispatcher.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tbbdispatcher.uz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for long-running report APIs
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location /health {
        proxy_pass http://127.0.0.1:8090/health;
        access_log off;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|svg|ico)$ {
        proxy_pass http://127.0.0.1:8090;
        proxy_cache_valid 200 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # Block dotfiles
    location ~ /\. {
        deny all;
        return 404;
    }
}
